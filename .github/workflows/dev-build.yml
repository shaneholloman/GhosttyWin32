name: Dev Build

on:
  push:
    branches: [dev]
  workflow_dispatch: {}

permissions:
  contents: write

# Run-coalescing: only one dev-build is meaningful at a time. If a newer push
# arrives while the previous build is still going, cancel the older one so we
# don't overwrite a newer artifact with an older one when both finish.
concurrency:
  group: dev-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest

    # Same Environment as pre-release tags. Auto-approves; only the production
    # `release` Environment requires reviewer approval.
    environment: dev-release

    steps:
      - name: Checkout GhosttyWin32
        uses: actions/checkout@v4

      - name: Checkout ghostty fork
        uses: actions/checkout@v4
        with:
          repository: i999rri/ghostty
          ref: feature/swapchain-panel-api
          path: ghostty

      - name: Compute dev version
        id: version
        shell: pwsh
        run: |
          # MSIX manifest Version is X.Y.Z.W (each part is UInt16, max 65535).
          # We use 0.3.0.<run_number> so each CI build is monotonically
          # increasing within a base version. Bump $base manually before
          # cutting a real v0.3.0 production tag so dev-builds for the next
          # cycle (0.4.x) don't collide.
          $base = "0.3.0"
          $runNumber = "${{ github.run_number }}"
          $msixVersion = "$base.$runNumber"
          $shortSha = "${{ github.sha }}".Substring(0, 7)
          $today = (Get-Date).ToString("yyyy-MM-dd")
          $displayVersion = "dev-$today-$shortSha"

          "msix_version=$msixVersion" >> $env:GITHUB_OUTPUT
          "display_version=$displayVersion" >> $env:GITHUB_OUTPUT
          "short_sha=$shortSha" >> $env:GITHUB_OUTPUT
          Write-Host "MSIX manifest Version : $msixVersion"
          Write-Host "Display version       : $displayVersion"

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build ghostty.dll
        shell: pwsh
        run: |
          cd ghostty
          zig build -Doptimize=ReleaseSafe -Drenderer=directx
          Copy-Item zig-out/lib/ghostty.dll ../ghostty/
          Copy-Item include/ghostty.h ../ghostty/
          $searchPaths = @(".")
          if ($env:ZIG_LOCAL_CACHE_DIR) { $searchPaths += $env:ZIG_LOCAL_CACHE_DIR }
          if (Test-Path "$env:LOCALAPPDATA\zig") { $searchPaths += "$env:LOCALAPPDATA\zig" }
          $lib = Get-ChildItem -Path $searchPaths -Recurse -Filter "ghostty.lib" -ErrorAction SilentlyContinue |
                 Where-Object { $_.Length -lt 100KB -and $_.Length -gt 10KB } |
                 Sort-Object LastWriteTime -Descending |
                 Select-Object -First 1
          if ($lib) {
            Copy-Item $lib.FullName ../ghostty/
            Write-Host "Found import lib: $($lib.FullName) ($($lib.Length) bytes)"
          } else {
            Write-Error "ghostty.lib import library not found"
            exit 1
          }

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore GhosttyWin32.sln

      - name: Patch manifest version
        shell: pwsh
        run: |
          $manifestPath = "GhosttyWin32 (Package)/Package.appxmanifest"
          (Get-Content $manifestPath) `
            -replace 'Version="[\d\.]+"', "Version=`"${{ steps.version.outputs.msix_version }}`"" |
            Set-Content $manifestPath -NoNewline

      - name: Decode signing certificate
        shell: pwsh
        env:
          PFX_BASE64: ${{ secrets.SIGNING_PFX_BASE64 }}
        run: |
          if (-not $env:PFX_BASE64) {
            Write-Error "SIGNING_PFX_BASE64 secret is empty. See .github/RELEASING.md."
            exit 1
          }
          $pfxBytes = [System.Convert]::FromBase64String($env:PFX_BASE64)
          [System.IO.File]::WriteAllBytes("ghostty-signing.pfx", $pfxBytes)

      - name: Build MSIX package
        shell: pwsh
        env:
          PFX_PASSWORD: ${{ secrets.SIGNING_PFX_PASSWORD }}
        run: |
          $pfxPath = (Resolve-Path "ghostty-signing.pfx").Path
          msbuild "GhosttyWin32 (Package)/GhosttyWin32 (Package).wapproj" `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:PlatformToolset=v143 `
            /p:GenerateAppxPackageOnBuild=true `
            /p:AppxPackageSigningEnabled=true `
            /p:PackageCertificateKeyFile=$pfxPath `
            /p:PackageCertificatePassword=$env:PFX_PASSWORD `
            /p:UapAppxPackageBuildMode=SideloadOnly `
            /p:AppxBundle=Never

      - name: Cleanup PFX
        if: always()
        shell: pwsh
        run: Remove-Item ghostty-signing.pfx -ErrorAction SilentlyContinue

      - name: Locate and rename MSIX
        id: locate
        shell: pwsh
        run: |
          $msix = Get-ChildItem -Recurse -Filter "*.msix" -Path "GhosttyWin32 (Package)/AppPackages" |
                  Where-Object { $_.Name -notlike "*Microsoft.*" } |
                  Select-Object -First 1
          if (-not $msix) {
            Write-Error "Built MSIX not found under AppPackages/"
            exit 1
          }
          $renamed = "Ghostty-dev-x64.msix"
          Copy-Item $msix.FullName $renamed
          "msix_path=$renamed" >> $env:GITHUB_OUTPUT

      - name: Verify .cer is committed
        shell: pwsh
        run: |
          if (-not (Test-Path "Ghostty.cer")) {
            Write-Error "Ghostty.cer not found in repo root."
            exit 1
          }

      # Replace the dev-build release in-place. Deleting the old release first
      # gives us a clean slate — softprops/action-gh-release otherwise appends
      # assets which would pile up across runs. We swallow errors so the very
      # first run (no prior release) doesn't fail.
      - name: Delete previous dev-build release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete dev-build --yes --cleanup-tag 2>$null
          $LASTEXITCODE = 0
          Write-Host "Cleared any previous dev-build release."

      - name: Create dev-build release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $shortSha = "${{ steps.version.outputs.short_sha }}"
          $now = Get-Date -Format 'yyyy-MM-dd HH:mm UTC'
          $repo = "${{ github.repository }}"
          $runId = "${{ github.run_id }}"
          $runNum = "${{ github.run_number }}"
          $sha = "${{ github.sha }}"
          $msixVer = "${{ steps.version.outputs.msix_version }}"

          $body = @"
**Dev build** — automated build of the latest ``dev`` branch.

⚠️ This is **not** a stable release. Expect bugs.

## Install

1. Download ``Ghostty-dev-x64.msix`` and ``Ghostty.cer``
2. Right-click ``Ghostty.cer`` → Install Certificate → **Local Machine** →
   **Trusted People** (UAC prompt; one-time per machine)
3. Double-click the ``.msix`` to install

If you previously installed Ghostty (stable or dev), this MSIX upgrades it
in place.

## Source

| | |
|---|---|
| Branch | ``dev`` |
| Commit | [``$shortSha``](https://github.com/$repo/commit/$sha) |
| Build  | [\#$runNum](https://github.com/$repo/actions/runs/$runId) |
| MSIX version | ``$msixVer`` |
| Built | $now |
"@

          gh release create dev-build `
            --title "Dev build (${{ steps.version.outputs.display_version }})" `
            --notes "$body" `
            --prerelease `
            "${{ steps.locate.outputs.msix_path }}" `
            Ghostty.cer
